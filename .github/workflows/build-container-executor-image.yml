name: Build Container Executor Image

# Builds the container coding-executor image
# (runtime/apps/orchestrator/deploy/Dockerfile.container-executor, build
# context runtime/) and pushes it to the foundation ECR repository. Tagged
# with the OpenMacaw commit SHA by default, matching the app-deploy convention.
#
# Order: deploy-container-execution-foundation (creates the ECR repo) ->
# THIS (pushes the image) -> deploy-container-runtime (references the tag).
#
# Reusable (workflow_call). Like the other deploys it authenticates with the
# OpenMacawDeployRole via OIDC, so it must be driven from the trusted KG-prod
# repo, not run directly from this public repo.

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "GitHub Environment to use."
        required: true
        default: development
        type: choice
        options:
          - development
          - staging
          - production
      ecr_repository_name:
        description: "Container executor ECR repository name (from the foundation deploy output)."
        required: true
        type: string
      image_tag:
        description: "Image tag. Defaults to the checked-out commit SHA."
        required: false
        type: string
      openmacaw_ref:
        description: "kmgrassi/OpenMacaw ref (branch/tag/SHA) to build from."
        required: false
        default: main
        type: string
  workflow_call:
    inputs:
      deploy_environment:
        required: false
        default: production
        type: string
      ecr_repository_name:
        required: true
        type: string
      image_tag:
        required: false
        default: ""
        type: string
      openmacaw_ref:
        required: false
        default: main
        type: string
    outputs:
      image_tag:
        description: "The tag the image was pushed with."
        value: ${{ jobs.build.outputs.image_tag }}
      image_uri:
        description: "Full <repo-url>:<tag> of the pushed image."
        value: ${{ jobs.build.outputs.image_uri }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-container-executor-image-${{ inputs.ecr_repository_name }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  DOCKERFILE: runtime/apps/orchestrator/deploy/Dockerfile.container-executor
  BUILD_CONTEXT: runtime
  ECR_REPOSITORY_NAME: ${{ inputs.ecr_repository_name }}
  IMAGE_TAG_OVERRIDE: ${{ inputs.image_tag || '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment || 'development' }}
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      # Explicitly check out OpenMacaw (not the caller) so the executor
      # Dockerfile and the runtime/ build context are present when this
      # reusable workflow is invoked via workflow_call from the KG-prod repo.
      - name: Check out OpenMacaw
        uses: actions/checkout@v5
        with:
          repository: kmgrassi/OpenMacaw
          ref: ${{ inputs.openmacaw_ref || 'main' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image metadata
        id: meta
        run: |
          set -euo pipefail

          REPO_URL="$(aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY_NAME" \
            --query 'repositories[0].repositoryUri' \
            --output text)"

          # Default the tag to the checked-out OpenMacaw commit (not the
          # caller's GITHUB_SHA), so it matches the app-deploy image tags.
          OPENMACAW_SHA="$(git rev-parse HEAD)"
          IMAGE_TAG="${IMAGE_TAG_OVERRIDE:-$OPENMACAW_SHA}"
          IMAGE_URI="${REPO_URL}:${IMAGE_TAG}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

          # The ECR repo uses immutable tags, and the tag is the deterministic
          # OpenMacaw SHA. If it already exists, re-pushing fails — so skip the
          # build entirely. This makes re-deploys of an unchanged commit a
          # no-op instead of an error.
          if aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY_NAME" \
            --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image ${IMAGE_URI} already exists; skipping build/push."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Building ${IMAGE_URI}"
          fi

      - name: Set up Docker Buildx
        if: steps.meta.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push executor image
        if: steps.meta.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image_uri }}
          provenance: false
