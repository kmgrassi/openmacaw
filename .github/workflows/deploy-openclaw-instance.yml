name: Deploy OpenClaw Instance

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply after planning."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      deploy_environment:
        description: "GitHub Environment to use for the deploy."
        required: true
        default: production
        type: choice
        options:
          - development
          - staging
          - production
      environment_slug:
        description: "Environment path/name segment used for SSM and Terraform values."
        required: true
        default: prod
        type: choice
        options:
          - dev
          - staging
          - prod
      deploy_config_param:
        description: "Optional full SSM config parameter path. Defaults to /openmacaw/<environment_slug>/openclaw-instance/deploy/config."
        required: false
        type: string
      broker_image:
        description: "Optional full broker image URI override."
        required: false
        type: string
      gateway_image:
        description: "Optional full gateway image URI override."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-openclaw-instance-${{ inputs.environment_slug || 'prod' }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: "true"
  TF_DIR: infra/terraform/stacks/openclaw-instance
  ENVIRONMENT_SLUG: ${{ inputs.environment_slug || 'prod' }}
  DEPLOY_CONFIG_PARAM_OVERRIDE: ${{ inputs.deploy_config_param || '' }}
  INPUT_BROKER_IMAGE: ${{ inputs.broker_image || '' }}
  INPUT_GATEWAY_IMAGE: ${{ inputs.gateway_image || '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment || 'production' }}
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deploy config from SSM
        id: deploy-config
        env:
          DEPLOY_RUN_ID: ${{ github.run_id }}
          DEFAULT_LOCK_ID: openmacaw/${{ inputs.environment_slug || 'prod' }}/openclaw-instance/terraform-apply
        run: |
          set -euo pipefail

          DEPLOY_CONFIG_PARAM="${DEPLOY_CONFIG_PARAM_OVERRIDE:-/openmacaw/${ENVIRONMENT_SLUG}/openclaw-instance/deploy/config}"

          echo "deploy_config_param=${DEPLOY_CONFIG_PARAM}" >> "$GITHUB_OUTPUT"
          echo "Deploy config parameter: ${DEPLOY_CONFIG_PARAM}"

          CONFIG_JSON="$(aws ssm get-parameter \
            --name "$DEPLOY_CONFIG_PARAM" \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text)"

          echo "$CONFIG_JSON" | jq -e '.terraform_backend and .terraform_vars' >/dev/null

          jq -r '.terraform_backend | to_entries[] |
            if (.value | type) == "boolean" or (.value | type) == "number" then
              "\(.key) = \(.value)"
            else
              "\(.key) = \"\(.value)\""
            end' <<<"$CONFIG_JSON" > "$RUNNER_TEMP/openclaw-instance.backend.hcl"

          jq -n \
            --argjson cfg "$CONFIG_JSON" \
            --arg deploy_run_id "$DEPLOY_RUN_ID" \
            '$cfg.terraform_vars + {
              deploy_run_id: $deploy_run_id
            }' > "$RUNNER_TEMP/openclaw-instance.tfvars.json"

          echo "backend_file=$RUNNER_TEMP/openclaw-instance.backend.hcl" >> "$GITHUB_OUTPUT"
          echo "tfvars_file=$RUNNER_TEMP/openclaw-instance.tfvars.json" >> "$GITHUB_OUTPUT"
          echo "broker_image_param=$(echo "$CONFIG_JSON" | jq -r '.runtime_pointers.broker_image_param // "/openclaw/dev/broker_image_uri"')" >> "$GITHUB_OUTPUT"
          echo "gateway_image_param=$(echo "$CONFIG_JSON" | jq -r '.runtime_pointers.gateway_image_param // "/openclaw/dev/gateway_image_uri"')" >> "$GITHUB_OUTPUT"
          echo "broker_protocol_param=$(echo "$CONFIG_JSON" | jq -r '.runtime_pointers.broker_protocol_param // "/openclaw/dev/broker_protocol_json"')" >> "$GITHUB_OUTPUT"
          echo "gateway_protocol_param=$(echo "$CONFIG_JSON" | jq -r '.runtime_pointers.gateway_protocol_param // "/openclaw/dev/gateway_protocol_json"')" >> "$GITHUB_OUTPUT"
          echo "lock_table=$(echo "$CONFIG_JSON" | jq -r '.deploy_lock.table // .terraform_vars.terraform_lock_table_name')" >> "$GITHUB_OUTPUT"
          echo "lock_id=$(echo "$CONFIG_JSON" | jq -r --arg default_lock_id "$DEFAULT_LOCK_ID" '.deploy_lock.lock_id // $default_lock_id')" >> "$GITHUB_OUTPUT"

      - name: Resolve runtime images
        id: images
        env:
          BROKER_IMAGE_PARAM: ${{ steps.deploy-config.outputs.broker_image_param }}
          GATEWAY_IMAGE_PARAM: ${{ steps.deploy-config.outputs.gateway_image_param }}
        run: |
          set -euo pipefail

          BROKER_IMAGE_URI="${INPUT_BROKER_IMAGE:-}"
          GATEWAY_IMAGE_URI="${INPUT_GATEWAY_IMAGE:-}"

          if [ -z "$BROKER_IMAGE_URI" ]; then
            BROKER_IMAGE_URI="$(aws ssm get-parameter \
              --name "$BROKER_IMAGE_PARAM" \
              --query 'Parameter.Value' \
              --output text)"
          fi

          if [ -z "$GATEWAY_IMAGE_URI" ]; then
            GATEWAY_IMAGE_URI="$(aws ssm get-parameter \
              --name "$GATEWAY_IMAGE_PARAM" \
              --query 'Parameter.Value' \
              --output text)"
          fi

          if [ -z "$BROKER_IMAGE_URI" ] || [ -z "$GATEWAY_IMAGE_URI" ]; then
            echo "Unable to resolve broker and gateway images." >&2
            exit 1
          fi

          if [[ "$GATEWAY_IMAGE_URI" == ghcr.io/openclaw/openclaw* ]]; then
            echo "Refusing upstream gateway image ($GATEWAY_IMAGE_URI). Use a deployment-specific gateway image." >&2
            exit 1
          fi

          echo "broker_image=$BROKER_IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "gateway_image=$GATEWAY_IMAGE_URI" >> "$GITHUB_OUTPUT"
          jq \
            --arg broker_image "$BROKER_IMAGE_URI" \
            --arg gateway_image "$GATEWAY_IMAGE_URI" \
            '. + {
              broker_image: $broker_image,
              gateway_image: $gateway_image
            }' "${{ steps.deploy-config.outputs.tfvars_file }}" > "$RUNNER_TEMP/openclaw-instance.with-images.tfvars.json"
          echo "tfvars_file=$RUNNER_TEMP/openclaw-instance.with-images.tfvars.json" >> "$GITHUB_OUTPUT"

      - name: Resolve and validate protocol compatibility
        id: protocol
        env:
          BROKER_PROTOCOL_PARAM: ${{ steps.deploy-config.outputs.broker_protocol_param }}
          GATEWAY_PROTOCOL_PARAM: ${{ steps.deploy-config.outputs.gateway_protocol_param }}
        run: |
          set -euo pipefail

          BROKER_PROTOCOL_JSON="$(aws ssm get-parameter \
            --name "$BROKER_PROTOCOL_PARAM" \
            --query 'Parameter.Value' \
            --output text)"
          GATEWAY_PROTOCOL_JSON="$(aws ssm get-parameter \
            --name "$GATEWAY_PROTOCOL_PARAM" \
            --query 'Parameter.Value' \
            --output text)"

          echo "$BROKER_PROTOCOL_JSON" | jq -e . >/dev/null
          echo "$GATEWAY_PROTOCOL_JSON" | jq -e . >/dev/null

          B_MIN="$(echo "$BROKER_PROTOCOL_JSON" | jq -er '.wire.min')"
          B_MAX="$(echo "$BROKER_PROTOCOL_JSON" | jq -er '.wire.max')"
          G_MIN="$(echo "$GATEWAY_PROTOCOL_JSON" | jq -er '.wire.min')"
          G_MAX="$(echo "$GATEWAY_PROTOCOL_JSON" | jq -er '.wire.max')"

          if [ "$B_MIN" -gt "$B_MAX" ] || [ "$G_MIN" -gt "$G_MAX" ]; then
            echo "Invalid protocol ranges in manifests." >&2
            exit 1
          fi

          if [ "$B_MIN" -gt "$G_MAX" ] || [ "$G_MIN" -gt "$B_MAX" ]; then
            echo "Protocol mismatch: broker[$B_MIN,$B_MAX] vs gateway[$G_MIN,$G_MAX]" >&2
            exit 1
          fi

          NEGOTIATED_MIN=$(( B_MIN > G_MIN ? B_MIN : G_MIN ))
          NEGOTIATED_MAX=$(( B_MAX < G_MAX ? B_MAX : G_MAX ))
          echo "negotiated_min=$NEGOTIATED_MIN" >> "$GITHUB_OUTPUT"
          echo "negotiated_max=$NEGOTIATED_MAX" >> "$GITHUB_OUTPUT"
          echo "Protocol compatible: broker[$B_MIN,$B_MAX] gateway[$G_MIN,$G_MAX] negotiated[$NEGOTIATED_MIN,$NEGOTIATED_MAX]"

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -backend-config="${{ steps.deploy-config.outputs.backend_file }}"

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -input=false -out=tfplan -var-file="${{ steps.images.outputs.tfvars_file }}"

      - name: Acquire deploy serialization lock
        if: ${{ inputs.apply == 'true' }}
        id: deploy-lock
        env:
          LOCK_TABLE: ${{ steps.deploy-config.outputs.lock_table }}
          LOCK_ID: ${{ steps.deploy-config.outputs.lock_id }}
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY}#${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          ACQUIRED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          NOW_EPOCH="$(date +%s)"
          EXPIRES_AT="$(( NOW_EPOCH + 3600 ))"

          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "Attempting deploy lock acquisition: table=$LOCK_TABLE lock_id=$LOCK_ID owner=$OWNER"
          for attempt in $(seq 1 60); do
            CURRENT="$(aws dynamodb get-item \
              --table-name "$LOCK_TABLE" \
              --key "{\"LockID\":{\"S\":\"$LOCK_ID\"}}" \
              --region "${AWS_REGION}" \
              --output json)"
            CURRENT_OWNER="$(echo "$CURRENT" | jq -r '.Item.Owner.S // ""')"
            CURRENT_EXPIRES="$(echo "$CURRENT" | jq -r '.Item.ExpiresAt.N // "0"')"
            NOW_EPOCH="$(date +%s)"

            if aws dynamodb put-item \
              --table-name "$LOCK_TABLE" \
              --item "{\"LockID\":{\"S\":\"$LOCK_ID\"},\"Owner\":{\"S\":\"$OWNER\"},\"CreatedAt\":{\"S\":\"$ACQUIRED_AT\"},\"ExpiresAt\":{\"N\":\"$EXPIRES_AT\"}}" \
              --condition-expression "attribute_not_exists(LockID) OR ExpiresAt < :now" \
              --expression-attribute-values "{\":now\":{\"N\":\"$NOW_EPOCH\"}}" \
              --region "${AWS_REGION}" >/dev/null 2>&1; then
              echo "acquired=true" >> "$GITHUB_OUTPUT"
              echo "Deploy lock acquired on attempt $attempt"
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Timed out waiting for deploy serialization lock $LOCK_ID in $LOCK_TABLE (current_owner=$CURRENT_OWNER expires=$CURRENT_EXPIRES now=$NOW_EPOCH)" >&2
              exit 1
            fi

            echo "Deploy lock busy (attempt $attempt/60 owner=$CURRENT_OWNER expires=$CURRENT_EXPIRES now=$NOW_EPOCH); retrying in 10s..."
            sleep 10
          done

      - name: Terraform apply
        if: ${{ inputs.apply == 'true' }}
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Release deploy serialization lock
        if: ${{ always() && inputs.apply == 'true' && steps.deploy-lock.outputs.acquired == 'true' }}
        env:
          LOCK_TABLE: ${{ steps.deploy-config.outputs.lock_table }}
          LOCK_ID: ${{ steps.deploy-config.outputs.lock_id }}
          LOCK_OWNER: ${{ steps.deploy-lock.outputs.owner }}
        run: |
          set -euo pipefail
          aws dynamodb delete-item \
            --table-name "$LOCK_TABLE" \
            --key "{\"LockID\":{\"S\":\"$LOCK_ID\"}}" \
            --condition-expression "#owner = :owner" \
            --expression-attribute-names "{\"#owner\":\"Owner\"}" \
            --expression-attribute-values "{\":owner\":{\"S\":\"$LOCK_OWNER\"}}" \
            --region "${AWS_REGION}"

      - name: Summary
        run: |
          {
            echo "### OpenClaw instance deploy"
            echo ""
            echo "- Apply: \`${{ inputs.apply }}\`"
            echo "- Config: \`${{ steps.deploy-config.outputs.deploy_config_param }}\`"
            echo "- Broker image: \`${{ steps.images.outputs.broker_image }}\`"
            echo "- Gateway image: \`${{ steps.images.outputs.gateway_image }}\`"
            echo "- Protocol range: \`${{ steps.protocol.outputs.negotiated_min }}-${{ steps.protocol.outputs.negotiated_max }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
