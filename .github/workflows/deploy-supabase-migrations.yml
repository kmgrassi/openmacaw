name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "platform/supabase/migrations/**"
      - "docs/supabase/openmacaw-schema.sql"
      - ".github/workflows/deploy-supabase-migrations.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply pending migrations. If false, run a dry-run only."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-supabase-migrations-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Supabase migrations
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.47.2

      - name: Validate Supabase deploy configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required Supabase deploy setting(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Link Supabase project
        working-directory: platform
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Show migration status before deploy
        working-directory: platform
        run: supabase migration list --password "$SUPABASE_DB_PASSWORD"

      - name: Dry-run pending migrations
        working-directory: platform
        run: supabase db push --dry-run --password "$SUPABASE_DB_PASSWORD"

      - name: Apply pending migrations
        if: github.event_name == 'push' || inputs.apply == true
        working-directory: platform
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Show migration status after deploy
        if: github.event_name == 'push' || inputs.apply == true
        working-directory: platform
        run: supabase migration list --password "$SUPABASE_DB_PASSWORD"
