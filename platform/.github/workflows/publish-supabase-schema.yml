name: Publish Supabase Schema Package

on:
  push:
    branches:
      - main
    paths:
      - "packages/supabase-schema/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@kmgrassi"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build schema package
        run: pnpm -C packages/supabase-schema run build

      - name: Set publish version
        working-directory: packages/supabase-schema
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '0.0.0-main.' + process.env.GITHUB_RUN_NUMBER;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Set version to', pkg.version);
          "

      - name: Publish schema package
        working-directory: packages/supabase-schema
        run: npm publish --tag main
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
