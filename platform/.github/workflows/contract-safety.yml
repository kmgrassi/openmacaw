name: Contract Safety

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: contract-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-contracts:
    name: Platform Contract Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Platform contract changes
        id: changes
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(apps/api/|apps/web/|contracts/|packages/|pnpm-lock\.yaml$|package\.json$|pnpm-workspace\.yaml$|tsconfig.*\.json$|\.github/workflows/contract-safety\.yml$)'; then
            echo "platform=true" >> "$GITHUB_OUTPUT"
          else
            echo "platform=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pnpm
        if: github.event_name != 'pull_request' || steps.changes.outputs.platform == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2
          run_install: false

      - name: Set up Node.js
        if: github.event_name != 'pull_request' || steps.changes.outputs.platform == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.changes.outputs.platform == 'true'
        run: pnpm install --frozen-lockfile

      - name: Check generated Platform API client
        if: github.event_name != 'pull_request' || steps.changes.outputs.platform == 'true'
        run: pnpm run platform-api-client:check

      - name: Validate API
        if: github.event_name != 'pull_request' || steps.changes.outputs.platform == 'true'
        run: pnpm -C apps/api run validate

      - name: Typecheck web
        if: github.event_name != 'pull_request' || steps.changes.outputs.platform == 'true'
        run: pnpm exec tsc --noEmit -p apps/web/tsconfig.app.json

      - name: Build web
        if: github.event_name != 'pull_request' || steps.changes.outputs.platform == 'true'
        run: pnpm -C apps/web run build

      - name: Test plan schema
        if: github.event_name != 'pull_request' || steps.changes.outputs.platform == 'true'
        run: pnpm -C packages/plan-schema run test

      - name: Skip expensive validation for docs-only pull requests
        if: github.event_name == 'pull_request' && steps.changes.outputs.platform != 'true'
        run: echo "No platform contract inputs changed; skipping validation."

  supabase-schema-contract:
    name: Supabase Schema Contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out Platform
        uses: actions/checkout@v4
        with:
          path: parallel-agent-platform

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: parallel-agent-platform/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: parallel-agent-platform
        run: pnpm install --frozen-lockfile

      - name: Check local Supabase schema package
        working-directory: parallel-agent-platform
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_ID }}
        run: pnpm run db:schema:check

      - name: Typecheck schema package
        working-directory: parallel-agent-platform
        run: pnpm -C packages/supabase-schema run typecheck
